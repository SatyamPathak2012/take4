<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    body {
        /* overflow: hidden; */
        background-color: #111;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }

    .top {
        display: flex;
        padding: 1rem;
        /* border: 1px solid black; */
        /* background-color: #59cbee; */
        background-color: rgba(9, 9, 9, 0.951);
        align-items: center;
        box-shadow: rgba(0, 0, 0, 0.286) 0px 3px 8px;
        height: 3rem;
        position: fixed;
        width: 100%;
        margin-top: -7.5rem;
        z-index: 5;
    }

    .name {
        font-family: "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
        font-size: 29px;
        font-weight: bolder;
        color: #ff9933;
        margin-left: 3rem;
    }

    .logo {
        padding: 0.6rem;
        /* border: 1px solid black; */
        border-radius: 50%;
        color: white;
        /* background-color: rgb(245, 199, 84); */
        background-color: #ff9933;
        font-size: larger;
        margin-left: 1rem;
    }

    .menuicon {
        font-size: large;
        color: white;
        padding: 0.75rem;
        border-radius: 50%;
        cursor: pointer;
        display: none;
    }

    .menuicon:hover {
        background-color: #59b2ee;
    }

    .aboutpage {
        color: white;
        text-decoration: none;
        font-size: larger;
        margin-left: 3.5rem;
        font-family: "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
        transform: translateX(0);
        transition: all 0.3s ease-in-out;
        border-top: 2px solid rgba(9, 9, 9, 0.951);
        border-bottom: 2px solid rgba(9, 9, 9, 0.951);
        /* border-radius: 10px; */
        /* border: 2px solid #59cbee; */
        /* border: 1px solid rgba(26,26,26,0.95); */
    }

    .homepage {
        color: white;
        text-decoration: none;
        font-size: larger;
        margin-left: 5rem;
        font-family: "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
        transform: translateX(0);
        transition: all 0.3s ease-in-out;
        padding-bottom: 1vh;
        border-bottom: 2px solid #ff9933;
        /* border-radius: 10px; */
        /* border: 2px solid #59cbee; */
        /* border: 2px solid rgba(26,26,26,0.95); */
    }

    .aboutpage:hover {
        /* text-decoration: underline; */
        font-size: 22px;
        transform: translateX(5px);
        border-top: 2px solid #ff9933;
        border-bottom: 2px solid #ff9933;
        padding: 0.5vw;
    }

    .reservebtn {
        display: inline-block;
        padding: 14px 40px;
        background: linear-gradient(45deg, #ff6b00, #ffb347);
        color: white;
        text-decoration: none;
        border-radius: 20px;
        font-weight: 600;
        transition: all 0.3s;
        border: none;
        cursor: pointer;
        font-size: 19px;
        /* margin-right: 4vw; */
        right: 4vw;
        bottom: 2vh;
        position: absolute;
    }

    .reservebtn:hover {
        /* background-color: #a31e25; */
        transform: translateY(-3px);
    }

    .mainbody {
        padding: 40px 6% 60px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 35px;
    }

    .img {
        cursor: pointer;
        background: rgba(255, 255, 255, .05);
        backdrop-filter: blur(15px);
        border-radius: 25px;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0, 0, 0, .35);
        transition: .45s;
        animation: fadeUp 1s ease;
    }

    .img:hover {
        transform:translateY(-15px) rotateX(6deg);
        box-shadow: 0 30px 60px rgba(0, 0, 0, .55);
    }

    .image {
        width: 100%;
        height: 260px;
        object-fit: cover;
        display: block;
        transition: .6s;
    }

    .img:hover .image {
        transform: scale(1.12);
    }

    .img-text {
        padding: 22px;
        text-align: center;
        font-size: 20px;
        font-weight: 600;
        color: white;
        background: rgba(0, 0, 0, .55);
    }
    .page-title{
        color: #ff9933;
        /* position: absolute; */
        margin-top: 7.5rem;
        font-size: 33px;
        font-weight: 700;
        text-align: center;
    }
</style>

<body>
    <div class="top">
        <i class="ri-menu-line menuicon"></i>
        <p class="name">The Momo House</p>
        <i class="ri-restaurant-line logo"></i>

        <a href="index.html" class="aboutpage">Home</a>
        <a href="aboutus.html" class="aboutpage">About us</a>
        <a href="menu.html" class="aboutpage">Our menu</a>
        <a href="gallery.html" class="homepage">Gallery</a>
        <a href="mybookings.html" class="aboutpage">My Bookings</a>

        <a class="a" href="booking.html"><button class="reservebtn">Book a Table</button></a>
    </div>

    <p class="page-title">GALLERY</p>
    <div class="mainbody">
        <div class="img">
            <img class="image" src="images/download.webp" alt="">
            <p class="img-text">Beautiful Inner Modeling</p>
        </div>
        <div class="img">
            <img class="image" src="images/OIP (1).png" alt="">
            <p class="img-text">Different drinks available</p>
        </div>
        <div class="img">
            <img class="image" src="images/images (5).jfif" alt="">
            <p class="img-text">Food festives and events</p>
        </div>
        <div class="img">
            <img class="image" src="images/download (1).png" alt="">
            <p class="img-text">Customer-friendly Waiters</p>
        </div>
        <div class="img">
            <img class="image" src="images/images (6).jfif" alt="">
            <p class="img-text">Every Dish Tempts</p>
        </div>
        <div class="img">
            <img class="image" src="images/download (2).webp" alt="">
            <p class="img-text">Enjoy food with amazing view</p>
        </div>
        <div class="img">
            <img class="image" src="images/download (3).png" alt="">
            <p class="img-text">Chefs cook with passion</p>
        </div>
        <div class="img">
            <img class="image" src="images/download (4).png" alt="">
            <p class="img-text">Irresistible Momo Delight</p>
        </div>
    </div>

</body>


</html>
