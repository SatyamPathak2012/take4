<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.css"
        integrity="sha512-OQDNdI5rpnZ0BRhhJc+btbbtnxaj+LdQFeh0V9/igiEPDiWE2fG+ZsXl0JEH+bjXKPJ3zcXqNyP4/F/NegVdZg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        box-sizing: border-box;
    }

    .a {
        /* color: black; */
        font-size: xx-large;
        text-decoration: none;
        color: white;
    }

    .backbtn {
        padding: 0.7rem;
        background: linear-gradient(45deg, #ff6b00, #ffb347);
        /* border: 1px solid white; */
        cursor: pointer;
        box-shadow: rgba(50, 50, 93, 0.25) 0px 50px 100px -20px, rgba(0, 0, 0, 0.3) 0px 30px 60px -30px, rgba(10, 37, 64, 0.35) 0px -2px 6px 0px inset;
        border-bottom-right-radius: 25px;
        padding-left: 1.5rem;
        padding-right: 1.5rem;
        border: none;
    }

    body {
        background: #111111;
        color: #333;
    }


    .hero {
        height: 35vh;
        background-color: rgba(9, 9, 9, 0.951);
        /* background-size: cover; */
        /* background-position: center; */
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: white;
        margin-top: -4vh;
        margin-bottom: 4vh;
    }


    .hero-content h1 {
        font-size: 52px;
        margin-bottom: 10px;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }

    .hero-content p {
        font-size: 20px;
    }


    .booking-container {
        width: 90%;
        max-width: 900px;
        background: #1d1d1d;
        margin: -70px auto 50px;
        padding: 40px;
        border-radius: 15px;
        box-shadow:0 10px 30px rgba(0, 0, 0, 0.15);
    }


    .booking-container h2 {
        text-align: center;
        color: #ff9933;
        margin-bottom: 30px;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        font-size: 32px;
    }


    .form-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
    }


    .form-group label {
        /* color: white; */
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
    }

    label {
        color: white;
        font-size: larger;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        margin-bottom: 1vh;
    }


    input,
    select,
    textarea {
        width: 100%;
        padding: 13px;
        /* border: 1px solid #ccc; */
        border: 3px solid #fc9e41;
        border-radius: 8px;
        font-size: 16px;
        outline: none;
    }


    input:focus,
    select:focus,
    textarea:focus {
        border: 3px solid;
        border-color: #ff6b00;
    }


    textarea {
        height: 120px;
        resize: none;
    }


    .full {
        grid-column: span 2;
    }

    .submitbtn {
        width: 100%;
        padding: 15px;
        /* background: #9b4d16; */
        background: linear-gradient(45deg, #ff6b00, #ffb347);
        border: none;
        color: white;
        font-size: 22px;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 1em;
    }


    .submitbtn:hover {
        transform: translateY(-3px);
        /* background: #6e330c; */

    }

    .backbutton {
        position: absolute;
    }

    .hero-div {
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        font-size: 27px;
        color: #ff9933;
    }

    .hero-div h1 {
        background: linear-gradient(#e53740, #e53740) bottom center / 25% 2px no-repeat;
        padding-bottom: 1.5vh;
        margin-bottom: 2vh;
    }

    .booking-text {
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        color: #ff9933;
        font-size: 20px;
    }
</style>

<body>
    <div class="backbutton">
        <button class="backbtn"><a class="a" href="index.html"><i
                    class="ri-arrow-left-line backicon"></i>Back</a></button>

    </div>
    <div class="hero">
        <div class="hero-div">
            <h1>Book a Table</h1>
            <p>Reserve your dining experience with us</p>
        </div>
    </div>

    <div class="booking-container">

        <h2 class="booking-text">Make a Reservation</h2>

        <form action="index.html">
            <div class="form-grid">

                <div>
                    <label>Name</label>
                    <input id="name" type="text" placeholder="Your name" required>
                </div>

                <div>
                    <label>Phone</label>
                    <input id="phone" type="tel" placeholder="Phone number" required>
                </div>

                <div>
                    <label>Email</label>
                    <input id="email" type="email" placeholder="Email address">
                </div>

                <div>
                    <label>Number of Guests</label>
                    <select id="guests">
                        <option>1 Person</option>
                        <option>2 People</option>
                        <option>3-4 People</option>
                        <option>5+ People</option>
                    </select>
                </div>

                <div>
                    <label>Date</label>
                    <input id="date" type="date" required>
                </div>

                <div>
                    <label>Time</label>
                    <input id="time" type="time" required>
                </div>

                <div class="full-width">
                    <label>Special Requests</label>
                    <textarea id="request" placeholder="Birthday, allergies, seating preference..."></textarea>
                </div>

                <div class="full-width">
                    <button class="submitbtn" type="button">Reserve Table</button>
                </div>

            </div>
        </form>


</body>
<script src="script.js"></script>

</html>
