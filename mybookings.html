<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }
          .top {
            display: flex;
            padding: 1rem;
            /* border: 1px solid black; */
            /* background-color: #59cbee; */
            background-color: rgba(9, 9, 9, 0.951);
            align-items: center;
            box-shadow: rgba(0, 0, 0, 0.286) 0px 3px 8px;
            height: 3rem;
            position: fixed;
            width: 100%;
            z-index: 5;
            /* margin-top: 6.5rem; */
        }

        .name {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 23px;
            font-weight: bolder;
            color: white;
            margin-left: 3rem;
        }

        .logo {
            padding: 0.6rem;
            /* border: 1px solid black; */
            border-radius: 50%;
            color: white;
            /* background-color: rgb(245, 199, 84); */
            background-color: #e53740;
            font-size: larger;
            margin-left: 1rem
        }

        .menuicon {
            font-size: large;
            color: white;
            padding: 0.75rem;
            border-radius: 50%;
            cursor: pointer;
            display: none;
        }

        .menuicon:hover {
            background-color: #59b2ee;
        }

        .aboutpage, .menupage {
            color: white;
            text-decoration: none;
            font-size: larger;
            margin-left: 5rem;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            transform: translateX(0);
            transition: all 0.3s ease-in-out;
            /* border-radius: 10px; */
            /* border: 2px solid #59cbee; */
            /* border: 1px solid rgba(26,26,26,0.95); */
        }

        .homepage {
            color: white;
            text-decoration: none;
            font-size: larger;
            margin-left: 6rem;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            transform: translateX(0);
            transition: all 0.3s ease-in-out;
            /* border-radius: 10px; */
            /* border: 2px solid #59cbee; */
            /* border: 2px solid rgba(26,26,26,0.95); */
        }

        .menupage:hover{
            font-size: 25px;
            transform: translateX(5px);
            border-top: 2px solid white;
            border-bottom: 2px solid white;
            padding: 0.5vw;
        }


        .homepage:hover {
            /* text-decoration: underline; */
            font-size: 25px;
            transform: translateX(5px);
            border-top: 2px solid white;
            border-bottom: 2px solid white;
            padding: 0.5vw;
        }

        .aboutpage:hover {
            /* text-decoration: underline; */
            font-size: 25px;
            transform: translateX(5px);
            border-top: 2px solid white;
            border-bottom: 2px solid white;
            padding: 0.5vw;
        }

        .aboutpage1{
            border-bottom: 2px solid #a31e25;
            padding-bottom: 1vh;
            color: white;
            text-decoration: none;
            font-size: larger;
            margin-left: 5rem;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            transform: translateX(0);
            transition: all 0.3s ease-in-out;
        }


        .reservebtn {
            display: inline-block;
            padding: 14px 40px;
            background-color: #e53740;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 19px;
            /* margin-right: 4vw; */
            right: 3vw;
            position: absolute;
        }

        .reservebtn:hover {
            background-color: #a31e25;
            transform: translateY(-3px);
        }
        .a{
            color: white;
            text-decoration: none;
            margin-bottom: 6.5vh;
        }
</style>
<body>
    <div class="top">
        <i class="ri-menu-line menuicon"></i>
        <p class="name">The Momo House</p>
        <i class="ri-restaurant-line logo"></i>

        <a href="index.html" class="homepage">Home</a>
        <a href="aboutus.html" class="aboutpage">About us</a>
        <a href="menu.html" class="menupage">Our menu</a>
        <a href="gallery.html" class="aboutpage">Gallery</a>
        <a href="mybookings.html" class="aboutpage1">My Bookings</a>

        <a class="a" href="booking.html"><button class="reservebtn">Book a Table</button></a>
    </div>
</body>
</html>
